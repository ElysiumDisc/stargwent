name: Build Releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty to read from README.md badge)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

# A tag push that arrives while a manual dispatch is still running will cancel
# the dispatch. Intentional: the tag is the canonical build.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Read version from README.md badge ─────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: get_version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VER="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER=$(sed -n 's/.*badge\/version-\([0-9.]\+\)-.*/\1/p' README.md | head -n1)
          fi
          if [[ -z "$VER" ]]; then
            echo "::error::Could not determine version from tag, input, or README.md badge"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "## Building Stargwent v$VER" >> "$GITHUB_STEP_SUMMARY"
          # Verify a CHANGELOG.md entry exists for this version (warn, don't fail).
          # CHANGELOG uses '### Version X.Y.Z' headers (not '## vX.Y.Z').
          if grep -qE "^### Version ${VER//./\\.}( |\$|—)" CHANGELOG.md; then
            echo "✓ CHANGELOG entry found for v$VER" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::No '### Version $VER' entry in CHANGELOG.md — release notes will be empty"
            echo "⚠ No CHANGELOG entry for v$VER" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Lint smoke test on minor Python versions we claim to support ──
  lint:
    needs: version
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Import-time smoke test
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python -c "import game_config; print('GAME_VERSION =', game_config.GAME_VERSION)"
          python -c "import gpu_renderer; import display_manager"

  # ── Linux: .deb + AppImage ────────────────────────────────────
  # Matrix: 22.04 is a regression sentinel; only the 24.04 leg uploads the
  # canonical artifacts. When ubuntu-26.04 becomes a hosted runner, add it.
  linux:
    needs: version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libfuse2 was renamed libfuse2t64 in 24.04 (t64 transition).
          # FUSE on the build host is only needed if appimagetool is run
          # without --appimage-extract-and-run; build_appimage.sh uses that
          # flag, so install is precautionary.
          if [[ "${{ matrix.os }}" == "ubuntu-22.04" ]]; then
            sudo apt-get install -y dpkg-dev fuse libfuse2 desktop-file-utils file
          else
            sudo apt-get install -y dpkg-dev fuse3 libfuse2t64 desktop-file-utils file
          fi

      - name: Build .deb
        run: ./build_deb.sh "${{ needs.version.outputs.version }}"

      - name: Build AppImage
        run: ./build_appimage.sh "${{ needs.version.outputs.version }}"

      # Only the ubuntu-24.04 leg uploads — it's the canonical release build.
      # The 22.04 leg is a regression sentinel (build must succeed there too).
      - name: Upload artifact (manual dispatch)
        if: matrix.os == 'ubuntu-24.04' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: Stargwent-${{ needs.version.outputs.version }}-linux
          path: builds/releases/*
          retention-days: 1

      - name: Upload to GitHub Release
        if: matrix.os == 'ubuntu-24.04' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          files: |
            builds/releases/*.deb
            builds/releases/*.AppImage

  # ── Windows: .exe ─────────────────────────────────────────────
  windows:
    needs: version
    runs-on: windows-2022
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-build.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Generate icon
        run: |
          python -c "
          from PIL import Image
          img = Image.open('assets/tauri_oneill.png')
          img.save('stargwent.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Ensure user_content exists
        run: mkdir -p user_content

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --name Stargwent --windowed \
            --icon=stargwent.ico \
            --add-data "assets;assets" \
            --add-data "shaders;shaders" \
            --add-data "docs;docs" \
            --add-data "user_content;user_content" \
            --hidden-import moderngl \
            --hidden-import glcontext \
            --hidden-import PIL \
            --hidden-import PIL._imaging \
            --hidden-import PIL.ImageDraw \
            --noconfirm \
            main.py

      - name: Package zip
        run: |
          mkdir -p builds/releases
          cd dist
          7z a -tzip "../builds/releases/Stargwent-${{ needs.version.outputs.version }}-windows-x64.zip" Stargwent/
        shell: bash

      - name: Upload artifact (manual dispatch)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v5
        with:
          name: Stargwent-${{ needs.version.outputs.version }}-windows-x64
          path: builds/releases/*windows*.zip
          retention-days: 1

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          files: builds/releases/*windows*.zip

  # ── macOS: .dmg ──────────────────────────────────────────────
  macos:
    needs: version
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-build.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Generate icon
        run: |
          mkdir -p stargwent.iconset
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE assets/tauri_oneill.png --out stargwent.iconset/icon_${SIZE}x${SIZE}.png
          done
          for SIZE in 16 32 128 256; do
            DOUBLE=$((SIZE * 2))
            sips -z $DOUBLE $DOUBLE assets/tauri_oneill.png --out stargwent.iconset/icon_${SIZE}x${SIZE}@2x.png
          done
          iconutil -c icns stargwent.iconset -o stargwent.icns

      - name: Ensure user_content exists
        run: mkdir -p user_content

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --name Stargwent --windowed \
            --icon=stargwent.icns \
            --add-data "assets:assets" \
            --add-data "shaders:shaders" \
            --add-data "docs:docs" \
            --add-data "user_content:user_content" \
            --hidden-import moderngl \
            --hidden-import glcontext \
            --hidden-import PIL \
            --hidden-import PIL._imaging \
            --hidden-import PIL.ImageDraw \
            --noconfirm \
            main.py

      - name: Create .dmg
        run: |
          mkdir -p builds/releases
          if [[ -d "dist/Stargwent.app" ]]; then
            SRC="dist/Stargwent.app"
          else
            SRC="dist/Stargwent"
          fi
          # Detach any auto-mounted volumes and sync before creating DMG
          hdiutil detach /Volumes/Stargwent 2>/dev/null || true
          sync
          # Retry once on "Resource busy" (macOS runners sometimes hold locks briefly)
          hdiutil create \
            -volname "Stargwent" \
            -srcfolder "$SRC" \
            -ov -format UDZO \
            "builds/releases/Stargwent-${{ needs.version.outputs.version }}-macos.dmg" \
          || {
            echo "hdiutil failed, retrying in 5s..."
            sleep 5
            hdiutil detach /Volumes/Stargwent 2>/dev/null || true
            hdiutil create \
              -volname "Stargwent" \
              -srcfolder "$SRC" \
              -ov -format UDZO \
              "builds/releases/Stargwent-${{ needs.version.outputs.version }}-macos.dmg"
          }

      - name: Upload artifact (manual dispatch)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v5
        with:
          name: Stargwent-${{ needs.version.outputs.version }}-macos
          path: builds/releases/*macos*.dmg
          retention-days: 1

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          files: builds/releases/*macos*.dmg

  # ── Create / update GitHub Release with description ─────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, linux, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract CHANGELOG section for this version
        id: changelog
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          # Pull everything between "### Version ${VER}" and the next
          # "### Version" heading. CHANGELOG uses this format, not
          # "## vX.Y.Z".
          BODY=$(awk -v v="${VER}" '
            $0 ~ "^### Version "v"( |$|—)" { f=1; next }
            f && /^### Version [0-9]/ { exit }
            f { print }
          ' CHANGELOG.md)
          if [[ -z "$(echo "$BODY" | tr -d '[:space:]')" ]]; then
            BODY="(no changelog entry found for v${VER})"
          fi
          # Multi-line output via heredoc delimiter.
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set release description
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          name: Stargwent v${{ needs.version.outputs.version }}
          body: |
            ## Stargwent v${{ needs.version.outputs.version }}

            ### Downloads
            | Platform | File | Install |
            |----------|------|---------|
            | Linux (Debian/Ubuntu) | `.deb` | `sudo dpkg -i stargwent_*.deb` then `stargwent` |
            | Linux (Universal) | `.AppImage` | `chmod +x` and run directly |
            | Windows | `.zip` | Extract and run `Stargwent.exe` |
            | macOS | `.dmg` | Open and drag to Applications |

            All builds support LAN multiplayer cross-play between platforms.

            ### What's new

            ${{ steps.changelog.outputs.body }}
